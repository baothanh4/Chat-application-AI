spring.application.name=ChatApplication
server.port=8081

# Database Configuration using .env variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true

# Redis Configuration using .env variables
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket Configuration
chat.websocket.endpoint=/ws
chat.websocket.app-destination-prefix=/app
chat.websocket.topic-prefix=/topic
chat.websocket.user-prefix=/user

logging.level.org.example.chatapplication.Service.AuthService=DEBUG