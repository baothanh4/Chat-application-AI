spring.application.name=ChatApplication
server.port=8081

# Database Configuration using .env variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true

# Redis Configuration using .env variables
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# WebSocket Configuration
chat.websocket.endpoint=/ws
chat.websocket.app-destination-prefix=/app
chat.websocket.topic-prefix=/topic
chat.websocket.user-prefix=/user

logging.level.org.example.chatapplication.Service.AuthService=DEBUG

# AI Chatbot Configuration
chatbot.bot-username=ai-assistant
chatbot.local.enabled=${CHATBOT_LOCAL_ENABLED:true}
chatbot.local.default-temperature=${CHATBOT_LOCAL_TEMPERATURE:0.7}
chatbot.local.default-max-tokens=${CHATBOT_LOCAL_MAX_TOKENS:512}
chatbot.ollama.enabled=${CHATBOT_OLLAMA_ENABLED:true}
chatbot.ollama.base-url=${CHATBOT_OLLAMA_BASE_URL:http://localhost:11434}
chatbot.ollama.model=${CHATBOT_OLLAMA_MODEL:llama3.1:8b}
chatbot.ollama.timeout-seconds=${CHATBOT_OLLAMA_TIMEOUT_SECONDS:45}

# JWT Configuration
jwt.secret=${JWT_SECRET:VGhpc0lzQVN1ZmZpY2llbnRseUxvbmdTZWNyZXRLZXlGb3JIUzI1Ng==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

